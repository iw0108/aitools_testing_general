# Create PR when code is pushed to a branch (e.g. by Codegen)
name: Create PR on push

on:
  push:
    branches:
      - 'codegen-bot/**'
      - 'feature/**'
      - 'ai/**'
    branches-ignore:
      - main
      - master

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check for existing PR
        id: pr_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTS=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          if [ "$EXISTS" -gt 0 ]; then
            echo "Open PR already exists for $BRANCH"
          fi

      - name: Create pull request
        if: steps.pr_check.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          BASE=main
          TITLE="${BRANCH//\// - }"
          BODY="Auto-generated PR from branch \`$BRANCH\`.

          - **Branch:** \`$BRANCH\`
          - **Triggered by:** push (e.g. Codegen AI)

          Add a ClickUp task link in the description to get review comments posted back to that task."
          gh pr create --base "$BASE" --head "$BRANCH" --title "$TITLE" --body "$BODY"
